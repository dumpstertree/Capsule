Section "Device"
    Identifier "amdgpu"
    Driver     "amdgpu"
    Option     "kmsdev"   "/dev/dri/card1"
    Option     "DRI"      "3"
EndSection

Section "Monitor"
    Identifier "monitor"
    Modeline "1920x1080" 148.50 1920 2008 2052 2200 1080 1084 1089 1125 +hsync +vsync
    Option   "PreferredMode" "1920x1080"
EndSection

Section "Screen"
    Identifier   "screen"
    Device       "amdgpu"
    Monitor      "monitor"
    DefaultDepth 24
    SubSection "Display"
        Depth  24
        Modes  "1920x1080"
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "layout"
    Screen     "screen"
    Option     "AutoAddDevices" "true"
    Option     "AutoAddGPU"     "false"
EndSection

Section "ServerFlags"
    Option "DontVTSwitch"       "true"
    Option "AllowMouseOpenFail" "true"
    Option "AutoAddDevices"     "true"
EndSection

Section "InputClass"
    Identifier  "force-evdev-all"
    MatchDevicePath "/dev/input/event*"
    Driver      "evdev"
    Option      "GrabDevice" "false"
EndSection

Section "Module"
    Load "dri3"
EndSection
