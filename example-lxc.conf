arch: amd64
cmode: console
cores: 8
dev0: /dev/dri/card1,mode=0666
dev1: /dev/dri/renderD128,mode=0666
dev2: /dev/uinput,mode=0666
entrypoint: /usr/bin/bash
features: nesting=1
hostname: capsule
memory: 16384
mp0: /mnt/games,mp=/games
net0: name=eth0,bridge=vmbr0,firewall=1,gw=192.168.1.1,host-managed=1,hwaddr=BC:24:11:83:4C:D7,ip=192.168.1.204/24,type=veth
ostype: archlinux
rootfs: local:116/vm-116-disk-0.raw,size=15G
swap: 2048
unprivileged: 0
lxc.environment.runtime: PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
lxc.environment.runtime: LANG=C.UTF-8
lxc.init.cwd: /
lxc.init.cmd: /sbin/init
lxc.mount.auto: sys:rw
lxc.signal.halt: SIGTERM
lxc.cgroup2.devices.allow: c 13:* rwm
lxc.mount.entry: /dev/input dev/input none bind,create=dir,shared 0 0
lxc.cgroup2.devices.allow: c 226:* rwm
lxc.mount.entry: /dev/dri/by-path dev/dri/by-path none bind,optional,create=dir


# edit - can be added through ui but bugged on current proxmox version
unprivileged: 0

# add - can be added through ui
dev0: /dev/dri/card1,mode=0666
dev1: /dev/dri/renderD128,mode=0666
dev2: /dev/uinput,mode=0666

# inits systemd
lxc.init.cmd: /sbin/init

# display
lxc.cgroup2.devices.allow: c 13:* rwm
lxc.cgroup2.devices.allow: c 226:* rwm

# input
lxc.mount.auto: sys:rw
lxc.mount.entry: /dev/input dev/input none bind,create=dir,shared 0 0

